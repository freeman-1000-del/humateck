<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humateck 관리자 로그 디버그</title>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; background:#0b1929; color:#fff; font-family:'Segoe UI',sans-serif; }
    .wrap { max-width:1200px; margin:0 auto; padding:24px; }
    .title { font-size:28px; font-weight:900; color:#c8a84b; margin-bottom:12px; }
    .card { background:#13294d; border:1px solid #2a3f5f; border-radius:14px; padding:18px; margin-bottom:16px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:10px; background:#c8a84b; color:#0b1929; text-decoration:none; font-weight:900; border:none; cursor:pointer; margin-right:8px; }
    .muted { color:#b9cce0; font-size:13px; line-height:1.7; }
    .mono { font-family:Consolas,monospace; font-size:12px; white-space:pre-wrap; line-height:1.6; color:#dce8f6; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th,td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; font-size:13px; white-space:nowrap; }
    th { color:#f5c518; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Humateck 관리자 로그 디버그</div>

    <div class="card">
      <div class="muted">이 파일은 왜 로그가 안 뜨는지 원인을 직접 보여 주는 점검판입니다.</div>
      <div style="margin-top:12px;">
        <button class="btn" id="tryA">A안: apikey + Authorization</button>
        <button class="btn" id="tryB">B안: apikey만</button>
      </div>
    </div>

    <div class="card">
      <div class="muted">현재 설정</div>
      <div class="mono" id="cfg"></div>
    </div>

    <div class="card">
      <div class="muted">응답 상태</div>
      <div class="mono" id="statusBox">대기 중</div>
    </div>

    <div class="card">
      <div class="muted">응답 본문</div>
      <div class="mono" id="bodyBox">대기 중</div>
    </div>

    <div class="card">
      <div class="muted">표 형식 미리보기</div>
      <table>
        <thead>
          <tr>
            <th>시간</th>
            <th>source</th>
            <th>page_name</th>
            <th>event_name</th>
            <th>detail</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr><td colspan="5">대기 중</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ajvytoyblrtecxuazqm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_cmn9eVnnvaAjXVJWa6bRQA_qrb1xglQ';
    const QUERY = `${SUPABASE_URL}/rest/v1/visitor_logs?select=*&order=created_at.desc&limit=100`;

    document.getElementById('cfg').textContent =
      `SUPABASE_URL = ${SUPABASE_URL}\nQUERY = ${QUERY}\nKEY = ${SUPABASE_KEY}`;

    async function runTest(mode) {
      const statusBox = document.getElementById('statusBox');
      const bodyBox = document.getElementById('bodyBox');
      const logBody = document.getElementById('logBody');

      statusBox.textContent = '불러오는 중...';
      bodyBox.textContent = '불러오는 중...';
      logBody.innerHTML = '<tr><td colspan="5">불러오는 중...</td></tr>';

      const headers = { apikey: SUPABASE_KEY };
      if (mode === 'A') {
        headers['Authorization'] = `Bearer ${SUPABASE_KEY}`;
      }

      try {
        const res = await fetch(QUERY, { headers });
        const text = await res.text();

        statusBox.textContent = `모드 ${mode}\nHTTP ${res.status} ${res.statusText}`;
        bodyBox.textContent = text || '(빈 응답)';

        let rows = [];
        try { rows = JSON.parse(text); } catch (e) {}

        if (Array.isArray(rows) && rows.length) {
          logBody.innerHTML = rows.map(r => `
            <tr>
              <td>${(r.created_at || '').replace('T', ' ').slice(0, 19)}</td>
              <td>${r.source || ''}</td>
              <td>${r.page_name || ''}</td>
              <td>${r.event_name || ''}</td>
              <td>${r.detail || ''}</td>
            </tr>
          `).join('');
        } else {
          logBody.innerHTML = '<tr><td colspan="5">배열 행 없음</td></tr>';
        }
      } catch (e) {
        statusBox.textContent = `모드 ${mode}\n예외 발생`;
        bodyBox.textContent = String(e);
        logBody.innerHTML = '<tr><td colspan="5">예외 발생</td></tr>';
      }
    }

    document.getElementById('tryA').addEventListener('click', () => runTest('A'));
    document.getElementById('tryB').addEventListener('click', () => runTest('B'));
  </script>
</body>
</html>
