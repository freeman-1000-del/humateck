<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Humateck | 준비 중</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0b1929; color:#fff; font-family:"Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { padding:40px 20px; }
  .logo { font-size:36px; font-weight:900; color:#c8a84b; margin-bottom:32px; }
  .icon { font-size:72px; margin-bottom:24px; }
  h1 { font-size:28px; font-weight:800; margin-bottom:16px; }
  p { font-size:16px; color:#8aa0b8; line-height:1.8; max-width:420px; margin:0 auto 32px; }
  .badge { display:inline-block; background:linear-gradient(135deg,#c8a84b,#e0c060); color:#0b1929; font-weight:800; font-size:13px; padding:8px 20px; border-radius:40px; margin-bottom:32px; }
  .contact { font-size:13px; color:#617087; margin-top:40px; }
  .contact a { color:#c8a84b; text-decoration:none; }
  .admin-form { margin-top:40px; display:flex; gap:8px; justify-content:center; }
  .admin-form input { padding:10px 16px; border-radius:40px; border:1px solid #2a3f5f; background:#13294d; color:#fff; font-size:14px; outline:none; width:180px; }
  .admin-form button { padding:10px 20px; border-radius:40px; border:none; background:#c8a84b; color:#0b1929; font-weight:800; cursor:pointer; }
  .err { color:#ff6b6b; font-size:13px; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Humateck</div>
  <div class="icon">🚧</div>
  <div class="badge">Coming Soon</div>
  <h1>서비스 준비 중입니다</h1>
  <p>전세계 유튜브 크리에이터들을 위한<br>초고속 글로벌 자막 등록 서비스를<br>곧 선보입니다.</p>
  <p class="contact">문의 : <a href="mailto:wejoy1000@gmail.com">wejoy1000@gmail.com</a></p>
  <div class="admin-form">
    <input type="text" id="adminPw" placeholder="관리자 비밀번호">
    <button onclick="checkPw()">입장</button>
  </div>
  <div class="err" id="errMsg"></div>
</div>
<script>
// 이미 인증된 경우 바로 이동
if(sessionStorage.getItem('ht_admin')) location.href='index.html';

function checkPw() {
  const pw = document.getElementById('adminPw').value;
  if(pw === '8517') {
    sessionStorage.setItem('ht_admin', '1');
    location.href = 'index.html';
  } else {
    document.getElementById('errMsg').textContent = '비밀번호가 틀렸습니다.';
  }
}
document.getElementById('adminPw').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkPw();
});
</script>
</body></html>
