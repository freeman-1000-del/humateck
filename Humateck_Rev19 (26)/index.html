<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Humateck | 첫페이지</title><link rel="stylesheet" href="style.css">
<script>if(!sessionStorage.getItem("ht_admin"))location.href="coming_soon.html";</script>


      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="login-submit-btn" id="signupSubmitBtn" style="background:linear-gradient(135deg,#0e7cad,#16b89e);">가입하기</button>
        <button class="signup-cancel-btn" id="signupCancelBtn">취소</button>
      </div>

      <p style="text-align:center;font-size:13px;color:#617087;margin:0;">
        이미 계정이 있으신가요?
        <button id="goLoginFromSignup" style="background:none;border:none;color:#0e7cad;font-weight:700;cursor:pointer;font-size:13px;">로그인</button>
      </p>
    </div>
  </div>
</div>

<script>
(function(){
  const SURL  = 'https://agxxpcgxgggkcdqvwmvg.supabase.co';
  const SANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFneHhwY2d4Z2dna2NkcXZ3bXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzA0MzAsImV4cCI6MjA5MTIwNjQzMH0.lmbWyY3sxfowqA_2L4PKp2_VOyxm4dBdZIW43aLxM-0';
  const sb = supabase.createClient(SURL, SANON);

  const signupBtn   = document.getElementById('signupModalBtn');
  const signupModal = document.getElementById('signupModal');
  const signupClose = document.getElementById('signupModalClose');
  const cancelBtn   = document.getElementById('signupCancelBtn');
  const submitBtn   = document.getElementById('signupSubmitBtn');
  const msg         = document.getElementById('signupMsg');
  const loginModal  = document.getElementById('loginModal');
  const goLogin     = document.getElementById('goLoginFromSignup');
  const emailCheck  = document.getElementById('emailCheckBtn');

  const openModal  = () => signupModal.classList.remove('hidden');
  const closeModal = () => signupModal.classList.add('hidden');

  signupBtn?.addEventListener('click', openModal);
  signupClose?.addEventListener('click', closeModal);
  cancelBtn?.addEventListener('click', closeModal);
  signupModal?.addEventListener('click', e => { if(e.target===signupModal) closeModal(); });
  goLogin?.addEventListener('click', () => { closeModal(); loginModal?.classList.remove('hidden'); });

  emailCheck?.addEventListener('click', () => {
    const email = document.getElementById('suEmail').value.trim();
    if (!email) { showMsg('이메일을 먼저 입력해 주세요.', false); return; }
    const valid = email.includes('@') && email.includes('.');
    showMsg(valid ? '사용 가능한 이메일 형식입니다.' : '올바른 이메일 형식이 아닙니다.', valid);
  });

  submitBtn?.addEventListener('click', async () => {
    const email = document.getElementById('suEmail').value.trim();
    const pw    = document.getElementById('suPw').value;
    const pwc   = document.getElementById('suPwConfirm').value;
    const name  = document.getElementById('suName').value.trim();
    const plan  = document.getElementById('suPlan').value;
    if (!email||!pw||!pwc||!name) { showMsg('이메일, 비밀번호, 이름을 입력해 주세요.', false); return; }
    if (pw !== pwc) { showMsg('비밀번호가 일치하지 않습니다.', false); return; }
    if (pw.length < 8) { showMsg('비밀번호는 8자 이상이어야 합니다.', false); return; }
    showMsg('가입 처리 중...', true);
    try {
      const { data, error } = await sb.auth.signUp({
        email, password: pw, options: { data: { name } }
      });
      if (error) throw error;
      if (data.user) {
        await sb.from('profiles').update({ plan, plan_status: 'inactive' }).eq('id', data.user.id);
      }
      showMsg('가입 완료! 아래 로그인 버튼을 눌러 주세요.', true);
      setTimeout(() => { closeModal(); loginModal?.classList.remove('hidden'); }, 2000);
    } catch(e) {
      showMsg(e.message.includes('already registered') ? '이미 가입된 이메일입니다.' : e.message, false);
    }
  });

  function showMsg(text, ok) {
    msg.textContent = text;
    msg.className = 'login-msg ' + (ok ? 'login-msg-ok' : 'login-msg-error');
  }
})();
</script>


</body>
